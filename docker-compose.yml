version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ai_analyst_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lihasigen4444}
      POSTGRES_DB: ai_analyst_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ai_analyst_redis
    restart: always
    ports:
      - "6379:6379"

  web:
    build: .
    container_name: ai_analyst_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:lihasigen4444@db:5432/ai_analyst_db
      - GROQ_API_KEY=${GROQ_API_KEY}
      - REDIS_URL=redis://redis:6379/0
      - EMBEDDING_MODEL_NAME=all-MiniLM-L6-v2
      - RERANK_MODEL_NAME=cross-encoder/ettin-reranker-17m-v1
    depends_on:
      - db
      - redis
    volumes:
      - .:/workspace

volumes:
  postgres_data:
