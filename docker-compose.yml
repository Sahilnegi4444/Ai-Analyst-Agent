version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ai_analyst_postgres
    restart: always
    environment:
      POSTGRES_USER: analyst_user
      POSTGRES_PASSWORD: analyst_password
      POSTGRES_DB: ai_analyst_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
