name: CI/CD Pipeline

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  lint-backend:
    name: Lint Backend (Ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff Linter
        run: ruff check app/ tests/

  lint-frontend:
    name: Lint Frontend (ESLint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Run ESLint
        run: |
          cd frontend
          npm run lint

  test-backend:
    name: Run Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_analyst_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache Hugging Face Models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-huggingface-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-huggingface-

      - name: Preload SentenceTransformer Models
        run: |
          python -c "from sentence_transformers import SentenceTransformer, CrossEncoder; SentenceTransformer('all-MiniLM-L6-v2'); CrossEncoder('cross-encoder/nli-deberta-v3-base')"

      - name: Seed database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_analyst_db
          REDIS_URL: redis://localhost:6379/0
        run: |
          python scripts/ingest_all.py

      - name: Run Tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_analyst_db
          REDIS_URL: redis://localhost:6379/0
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_SQL_MODEL: llama-3.1-8b-instant
          GROQ_ROUTER_MODEL: llama-3.1-8b-instant
          EMBEDDING_MODEL_NAME: all-MiniLM-L6-v2
          RERANK_MODEL_NAME: cross-encoder/nli-deberta-v3-base
        run: |
          python -m unittest discover -s tests -p "test_*.py"

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ai-analyst-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  prepare-artifacts:
    name: Prepare Deployment Artifacts
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [lint-backend, lint-frontend, test-backend, build-docker]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies & Build
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Prepare Package files
        run: |
          mkdir -p release/frontend
          cp -r frontend/dist release/frontend/dist
          cp -r app release/app
          cp -r scripts release/scripts
          cp -r data release/data
          cp requirements.txt release/requirements.txt
          cp Dockerfile release/Dockerfile
          cp DEPLOYMENT.md release/DEPLOYMENT.md

      - name: Archive Release Package
        run: |
          cd release
          zip -r ../deployment-package.zip .

      - name: Upload Deployment Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: deployment-package.zip
          retention-days: 7
